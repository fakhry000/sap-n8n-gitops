name: Build n8n runners image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'images/runners/**'
      - '.github/workflows/build-runners.yml'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/fakhry000/n8n-runners
  IMAGE_TAG: 2.13.3-custom

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push custom runners image
        uses: docker/build-push-action@v6
        with:
          context: ./images/runners
          file: ./images/runners/Dockerfile
          push: true
          tags: |
            ghcr.io/fakhry000/n8n-runners:2.13.3-custom
            ghcr.io/fakhry000/n8n-runners:ci-${{ github.run_number }}
