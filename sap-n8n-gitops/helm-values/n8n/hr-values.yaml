image:
  tag: "2.13.3"

timezone: Europe/Berlin

main:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 512Mi

worker:
  enabled: false

webhook:
  enabled: false

database:
  type: postgresdb
  host: postgres-0c548fc8-fc4a-4fbe-adfe-6f12e1795f34.c24srvdukvjo.us-east-1.rds.amazonaws.com
  port: 1470
  database: FYkYoolAgeWd
  user: 074d01b045cd
  schema: n8n_hr
  ssl:
    enabled: true
    rejectUnauthorized: false
  passwordSecret:
    name: n8n-db-password
    key: password

redis:
  host: redis-hr-master
  port: 6379

n8n:
  host: sap-n8n-hr.c-5e397ae.kyma.ondemand.com
  protocol: https

secretRefs:
  existingSecret: n8n-hr-core-secret

extraEnv:
  - name: N8N_RUNNERS_ENABLED
    value: "true"
  - name: N8N_RUNNERS_MODE
    value: "external"
  - name: N8N_RUNNERS_BROKER_PORT
    value: "5679"
  - name: N8N_RUNNERS_BROKER_LISTEN_ADDRESS
    value: "0.0.0.0"
  - name: N8N_RUNNERS_AUTH_TOKEN
    valueFrom:
      secretKeyRef:
        name: n8n-hr-runners-secret
        key: token

extraContainers:
  - name: n8n-runners
    image: docker.n8n.io/n8nio/runners:2.13.3
    imagePullPolicy: IfNotPresent
    env:
      - name: N8N_RUNNERS_AUTH_TOKEN
        valueFrom:
          secretKeyRef:
            name: n8n-hr-runners-secret
            key: token
      - name: N8N_RUNNERS_TASK_BROKER_URI
        value: "http://127.0.0.1:5679"
      - name: N8N_RUNNERS_AUTO_SHUTDOWN_TIMEOUT
        value: "15"