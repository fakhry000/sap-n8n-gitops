apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: n8n-it
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: oci://ghcr.io/n8n-io/n8n-helm-chart
      chart: n8n
      targetRevision: 1.1.0
      helm:
        releaseName: n8n-it
        valueFiles:
          - \/sap-n8n-gitops/helm-values/n8n/it-values.yaml
    - repoURL: https://github.com/fakhry000/sap-n8n-gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: sap-n8n-kyma
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
