apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: n8n-sales
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/n8n-io/n8n-hosting.git
      targetRevision: main
      path: charts/n8n
      helm:
        releaseName: n8n-sales
        valueFiles:
          - $values/sap-n8n-gitops/helm-values/n8n/sales-values.yaml
    - repoURL: https://github.com/fakhry000/sap-n8n-gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: sap-n8n-kyma
  syncPolicy:
    automated:
      prune: true
      selfHeal: true